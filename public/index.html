<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anti-Multa Goiânia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; height: 100vh; overflow: hidden; }

        /* AUTENTICAÇÃO */
        .tela-autenticacao { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 20px; background-color: #1a1c25; }
        .card-auth { background-color: #23252f; padding: 25px; border-radius: 12px; border: 2px solid #3a3d48; width: 100%; max-width: 360px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); text-align: center; }
        .card-auth h2 { margin: 0 0 15px 0; color: #0079f2; font-size: 20px; text-transform: uppercase; }
        .input-auth { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 2px solid #3a3d48; background-color: #15171f; color: white; font-size: 15px; }
        .btn-auth { width: 100%; padding: 14px; background-color: #0079f2; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-auth-secundario { background: none; border: none; color: #a2a8b2; font-size: 13px; margin-top: 15px; cursor: pointer; text-decoration: underline; display: block; margin: 10px auto 0; }

        /* APP PRINCIPAL */
        #app-container { display: none; flex-direction: column; height: 100vh; }

        /* PAINEL SUPERIOR */
        #painel-superior { padding: 10px 15px; background-color: #1e1e1e; border-bottom: 4px solid #333; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        #texto-status { font-size: 14px; font-weight: bold; color: #aaa; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .dashboard-container { display: flex; align-items: center; justify-content: space-around; width: 100%; max-width: 400px; }
        .semaforo { background-color: #222; padding: 8px; border-radius: 15px; display: flex; flex-direction: column; gap: 8px; border: 2px solid #444; }
        .luz { width: 24px; height: 24px; border-radius: 50%; background-color: #333; transition: background-color 0.2s, box-shadow 0.2s; }
        .luz-verde.ativa { background-color: #00e676; box-shadow: 0 0 15px #00e676; }
        .luz-amarela.ativa { background-color: #ffea00; box-shadow: 0 0 15px #ffea00; }
        .luz-vermelha.ativa { background-color: #ff1744; box-shadow: 0 0 15px #ff1744; }
        #vel-atual { font-size: 65px; font-weight: bold; color: #ffffff; line-height: 1; }
        .unidade-medida { font-size: 14px; color: #888; font-weight: bold; }
        .bloco-limites { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #bbb; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 8px; min-width: 110px; }
        .limite-linha { display: flex; justify-content: space-between; }
        .limite-valor { font-weight: bold; color: #fff; }

        /* MAPA */
        #conteudo-central { flex: 1; position: relative; width: 100%; }
        #mapa { width: 100%; height: 100%; z-index: 1; }

        /* PAINEL DE BOTÕES — 4 botões */
        #painel-botoes { display: flex; padding: 8px; background-color: #1e1e1e; gap: 8px; border-top: 2px solid #333; z-index: 10; }
        .btn-acao { flex: 1; padding: 12px 4px; font-size: 11px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; line-height: 1.3; }
        .btn-fixar   { background-color: #f57c00; }
        .btn-meus    { background-color: #0288d1; }
        .btn-hist    { background-color: #5c35b5; }
        .btn-pip     { background-color: #2e7d32; }

        #info-gps { padding: 5px; font-size: 10px; text-align: center; background-color: #111; color: #888; z-index: 10; }

        /* MODAL FIXAR RADAR */
        #modal-fixar-radar { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #1e1e1e; border: 3px solid #f57c00; border-radius: 15px; padding: 20px; z-index: 500; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        #modal-fixar-radar h4 { margin: 0 0 15px 0; color: #f57c00; font-size: 16px; }
        .container-botoes-vel { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .btn-vel-opcao { background-color: #333; color: white; border: 2px solid #f57c00; padding: 18px; font-size: 22px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-vel-opcao:active { background-color: #f57c00; }
        .btn-cancelar-radar { background-color: #555; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* TELA MEUS RADARES */
        .tela-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(18,18,18,0.98); z-index: 300; flex-direction: column; }
        .topo-overlay { background-color: #1e1e1e; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; }
        .topo-overlay h3 { margin: 0; color: #ffea00; font-size: 16px; text-transform: uppercase; }
        .btn-fechar-overlay { background-color: #c62828; color: white; border: none; padding: 8px 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .corpo-overlay-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .tabela-overlay { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tabela-overlay th { color: #888; padding: 8px 4px; border-bottom: 1px solid #333; text-align: left; }
        .tabela-overlay td { padding: 10px 4px; border-bottom: 1px solid #222; vertical-align: middle; }
        .btn-deletar { background-color: #c62828; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        /* HISTÓRICO — cores semafóricas */
        .hist-verde { color: #00e676; font-weight: bold; }
        .hist-amarelo { color: #ffea00; font-weight: bold; }
        .hist-vermelho { color: #ff1744; font-weight: bold; }

        /* PIP */
        #canvas-pip { display: none; }
    </style>
</head>
<body>

<!-- TELAS DE AUTENTICAÇÃO -->
<div id="tela-login" class="tela-autenticacao">
    <div class="card-auth">
        <h2>🚦 Anti-Multa Goiânia</h2>
        <input type="email" id="login-email" class="input-auth" placeholder="Seu E-mail">
        <input type="password" id="login-senha" class="input-auth" placeholder="Sua Senha">
        <button class="btn-auth" onclick="executarLoginTradicional()">ENTRAR NO PAINEL</button>
        <button class="btn-auth-secundario" onclick="alternarFluxoAuth('pin')">Usar PIN de 4 dígitos</button>
        <button class="btn-auth-secundario" onclick="alternarFluxoAuth('cadastro')">Criar nova conta</button>
    </div>
</div>

<div id="tela-pin" class="tela-autenticacao" style="display:none;">
    <div class="card-auth">
        <h2>PIN Rápido</h2>
        <input type="email" id="pin-email" class="input-auth" placeholder="Seu E-mail">
        <input type="number" id="login-pin" class="input-auth" placeholder="PIN de 4 dígitos" inputmode="numeric">
        <button class="btn-auth" onclick="executarLoginPorPIN()">VERIFICAR E ENTRAR</button>
        <button class="btn-auth-secundario" onclick="alternarFluxoAuth('login')">Voltar para Senha</button>
    </div>
</div>

<div id="tela-cadastro" class="tela-autenticacao" style="display:none;">
    <div class="card-auth">
        <h2>Novo Cadastro</h2>
        <input type="text" id="cad-nome" class="input-auth" placeholder="Nome Completo">
        <input type="email" id="cad-email" class="input-auth" placeholder="E-mail">
        <input type="password" id="cad-senha" class="input-auth" placeholder="Senha">
        <input type="number" id="cad-pin" class="input-auth" placeholder="PIN de 4 dígitos" inputmode="numeric">
        <button class="btn-auth" onclick="executarCadastroMotorista()">CRIAR CONTA</button>
        <button class="btn-auth-secundario" onclick="alternarFluxoAuth('login')">Já tenho conta</button>
    </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app-container">
    <div id="painel-superior">
        <div id="texto-status">SINALIZADOR DE VIA ACTIVO</div>
        <div class="dashboard-container">
            <div class="semaforo">
                <div id="luz-vermelha" class="luz luz-vermelha"></div>
                <div id="luz-amarela" class="luz luz-amarela"></div>
                <div id="luz-verde" class="luz luz-verde ativa"></div>
            </div>
            <div style="text-align:center;" onclick="liberarAudioNavegador()">
                <span id="vel-atual">0</span><br><span class="unidade-medida">KM/H</span>
            </div>
            <div class="bloco-limites">
                <div class="limite-linha"><span>Máximo:</span><span id="vel-maxima" class="limite-valor">60</span></div>
                <div class="limite-linha"><span>Mínimo:</span><span id="vel-minima" class="limite-valor">30</span></div>
                <div id="distancia-radar" style="font-size:11px;color:#ffea00;margin-top:4px;font-weight:bold;text-align:center;"></div>
            </div>
        </div>
    </div>

    <div id="conteudo-central">
        <div id="mapa"></div>
    </div>

    <!-- MODAL FIXAR RADAR -->
    <div id="modal-fixar-radar">
        <h4>📍 FIXAR RADAR — ESCOLHA O LIMITE</h4>
        <div class="container-botoes-vel">
            <button class="btn-vel-opcao" onclick="publicarRadar(40)">40<br><small>km/h</small></button>
            <button class="btn-vel-opcao" onclick="publicarRadar(50)">50<br><small>km/h</small></button>
            <button class="btn-vel-opcao" onclick="publicarRadar(60)">60<br><small>km/h</small></button>
            <button class="btn-vel-opcao" onclick="publicarRadar(80)">80<br><small>km/h</small></button>
        </div>
        <button class="btn-cancelar-radar" onclick="fecharModalRadar()">❌ CANCELAR</button>
    </div>

    <!-- TELA MEUS RADARES -->
    <div id="tela-meus-radares" class="tela-overlay">
        <div class="topo-overlay">
            <h3>📍 Meus Radares</h3>
            <button class="btn-fechar-overlay" onclick="fecharTela('tela-meus-radares')">❌ VOLTAR</button>
        </div>
        <div class="corpo-overlay-scroll">
            <table class="tabela-overlay">
                <thead><tr><th>Localização</th><th>Limite</th><th>Data</th><th>Ação</th></tr></thead>
                <tbody id="corpo-meus-radares"></tbody>
            </table>
        </div>
    </div>

    <!-- TELA HISTÓRICO -->
    <div id="tela-historico" class="tela-overlay">
        <div class="topo-overlay">
            <h3>📋 Histórico de Passagens</h3>
            <button class="btn-fechar-overlay" onclick="fecharTela('tela-historico')">❌ VOLTAR</button>
        </div>
        <div class="corpo-overlay-scroll">
            <table class="tabela-overlay">
                <thead><tr><th>Local</th><th>Vel.</th><th>Limite</th><th>Status</th><th>Data/Hora</th></tr></thead>
                <tbody id="corpo-historico"></tbody>
            </table>
        </div>
    </div>

    <!-- BOTÕES DE AÇÃO -->
    <div id="painel-botoes">
        <button class="btn-acao btn-fixar"  onclick="abrirModalRadar()">📍<br>FIXAR<br>RADAR</button>
        <button class="btn-acao btn-meus"   onclick="abrirTela('tela-meus-radares')">🗂️<br>MEUS<br>RAD.</button>
        <button class="btn-acao btn-hist"   onclick="abrirTela('tela-historico')">📋<br>HISTÓRICO</button>
        <button class="btn-acao btn-pip"    onclick="alternarModoFlutuante()">🔲<br>FLUTUANTE</button>
    </div>

    <div id="info-gps">Precisão GPS: -- | Banco Nuvem Ativo</div>
</div>

<canvas id="canvas-pip" width="500" height="500"></canvas>
<video id="video-pip" autoplay muted playsinline style="display:none;"></video>

<script>
    const API_URL = window.location.origin;
    let tokenLocal = localStorage.getItem('asb_jwt_token');
    let emailUsuarioLogado = localStorage.getItem('asb_user_email') || '';
    let meuIdUsuario = null;

    let listaRadares = [];
    let historicoPassagens = JSON.parse(localStorage.getItem('asb_historico') || '[]');

    const mapa = L.map('mapa').setView([-16.6869, -49.2648], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(mapa);

    let marcadorMotorista = null;
    let minhaLatAtual = 0, minhaLonAtual = 0;
    let velocidadeGlobal = 0, limiteGlobal = 60;
    let distGlobal = '', statusTextoGlobal = 'VIA MONITORADA';
    let audioCtx = null;

    // Controle do bipe oscilatório
    let bipIntervalId = null;
    let dentroDoRaio = false;

    // =====================================================================
    // AUTENTICAÇÃO
    // =====================================================================
    function alternarFluxoAuth(tela) {
        document.getElementById('tela-login').style.display    = tela === 'login'    ? 'flex' : 'none';
        document.getElementById('tela-pin').style.display      = tela === 'pin'      ? 'flex' : 'none';
        document.getElementById('tela-cadastro').style.display = tela === 'cadastro' ? 'flex' : 'none';
        if (tela === 'pin') document.getElementById('pin-email').value = document.getElementById('login-email').value;
    }

    async function checarAutenticacaoExistente() {
        if (tokenLocal) {
            try {
                const resposta = await fetch(`${API_URL}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${tokenLocal}` }
                });
                if (resposta.ok) {
                    const dados = await resposta.json();
                    meuIdUsuario = dados.id;
                    entrarNoAplicativo();
                } else { limparTokens(); }
            } catch (e) { entrarNoAplicativo(); }
        }
    }

    function limparTokens() {
        localStorage.removeItem('asb_jwt_token');
        tokenLocal = null;
        alternarFluxoAuth('login');
    }

    function entrarNoAplicativo() {
        document.getElementById('tela-login').style.display    = 'none';
        document.getElementById('tela-pin').style.display      = 'none';
        document.getElementById('tela-cadastro').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        mapa.invalidateSize();
        sincronizarBancoDeRadares();
        inicializarRastreamentoGPS();
        renderizarHistorico();
    }

    async function executarLoginTradicional() {
        const email = document.getElementById('login-email').value;
        const senha = document.getElementById('login-senha').value;
        try {
            const resposta = await fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });
            const dados = await resposta.json();
            if (resposta.ok) {
                localStorage.setItem('asb_jwt_token', dados.token);
                localStorage.setItem('asb_user_email', email);
                tokenLocal = dados.token;
                meuIdUsuario = dados.user.id;
                entrarNoAplicativo();
            } else { alert(dados.error); }
        } catch (e) { alert('Erro de conexão com o servidor.'); }
    }

    async function executarLoginPorPIN() {
        const email = document.getElementById('pin-email').value;
        const pin   = document.getElementById('login-pin').value;
        try {
            const resposta = await fetch(`${API_URL}/api/auth/pin`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, pin })
            });
            const dados = await resposta.json();
            if (resposta.ok) {
                localStorage.setItem('asb_jwt_token', dados.token);
                localStorage.setItem('asb_user_email', email);
                tokenLocal = dados.token;
                meuIdUsuario = dados.user.id;
                entrarNoAplicativo();
            } else { alert(dados.error); }
        } catch (e) { alert('Erro ao validar PIN.'); }
    }

    async function executarCadastroMotorista() {
        const nome  = document.getElementById('cad-nome').value;
        const email = document.getElementById('cad-email').value;
        const senha = document.getElementById('cad-senha').value;
        const pin   = document.getElementById('cad-pin').value;
        try {
            const resposta = await fetch(`${API_URL}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha, pin })
            });
            const dados = await resposta.json();
            if (resposta.ok) {
                localStorage.setItem('asb_jwt_token', dados.token);
                localStorage.setItem('asb_user_email', email);
                tokenLocal = dados.token;
                meuIdUsuario = dados.user.id;
                entrarNoAplicativo();
            } else { alert(dados.error); }
        } catch (e) { alert('Erro no cadastro.'); }
    }

    // =====================================================================
    // RADARES — SINCRONISMO E MAPA
    // =====================================================================
    async function sincronizarBancoDeRadares() {
        try {
            const resposta = await fetch(`${API_URL}/api/radares`);
            if (resposta.ok) {
                listaRadares = await resposta.json();
                plotarRadaresNoMapa();
                renderizarMeusRadares();
            }
        } catch (e) { console.log('Cache local ativo.'); }
        setTimeout(sincronizarBancoDeRadares, 30000); // Atualiza a cada 30s
    }

    function plotarRadaresNoMapa() {
        mapa.eachLayer(layer => {
            if ((layer instanceof L.Circle || layer instanceof L.CircleMarker) && layer !== marcadorMotorista) {
                mapa.removeLayer(layer);
            }
        });
        listaRadares.forEach(radar => {
            const souDono = radar.user_id === meuIdUsuario;
            const cor = souDono ? '#0079f2' : '#ff1744';
            L.circle([radar.lat, radar.lon], { color: cor, fillColor: cor, fillOpacity: 0.15, radius: 100 }).addTo(mapa);
            L.circleMarker([radar.lat, radar.lon], { radius: 7, color: '#fff', fillColor: cor, fillOpacity: 1 })
                .addTo(mapa)
                .bindPopup(`<b>${radar.local}</b><br>Limite: ${radar.velocidade} km/h`);
        });
    }

    function abrirModalRadar() {
        if (minhaLatAtual === 0) return alert('Aguardando sinal do GPS. Tente em alguns segundos.');
        document.getElementById('modal-fixar-radar').style.display = 'block';
    }
    function fecharModalRadar() { document.getElementById('modal-fixar-radar').style.display = 'none'; }

    async function publicarRadar(velocidade) {
        const agora = new Date();
        const novoRadar = {
            local: `Radar ${velocidade}km/h — ${agora.toLocaleTimeString('pt-BR')}`,
            lat: minhaLatAtual,
            lon: minhaLonAtual,
            velocidade: velocidade
        };
        try {
            const resposta = await fetch(`${API_URL}/api/radares`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${tokenLocal}`
                },
                body: JSON.stringify(novoRadar)
            });
            if (resposta.ok) {
                fecharModalRadar();
                await sincronizarBancoDeRadares();
                alert(`✅ Radar de ${velocidade} km/h fixado!`);
            } else {
                const err = await resposta.json();
                alert('Erro: ' + err.error);
            }
        } catch (e) { alert('Erro ao publicar radar.'); }
    }

    async function removerRadar(id) {
        if (!confirm('Deseja remover este radar?')) return;
        try {
            const resposta = await fetch(`${API_URL}/api/radares/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${tokenLocal}` }
            });
            if (resposta.ok) {
                await sincronizarBancoDeRadares();
            }
        } catch (e) { alert('Erro ao remover radar.'); }
    }

    // =====================================================================
    // MEUS RADARES
    // =====================================================================
    function renderizarMeusRadares() {
        const tbody = document.getElementById('corpo-meus-radares');
        tbody.innerHTML = '';
        const meus = listaRadares.filter(r => r.user_id === meuIdUsuario);
        if (meus.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#888;padding:20px;">Nenhum radar fixado ainda.</td></tr>';
            return;
        }
        meus.forEach(radar => {
            const data = new Date(radar.criado_em).toLocaleDateString('pt-BR');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${radar.local}</td>
                <td>${radar.velocidade} km/h</td>
                <td>${data}</td>
                <td><button class="btn-deletar" onclick="removerRadar(${radar.id})">🗑️</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // =====================================================================
    // HISTÓRICO DE PASSAGENS (local, automático)
    // =====================================================================
    function registrarPassagem(radar, velocidadePassagem) {
        const agora = new Date();
        const entrada = {
            local: radar.local,
            velocidade: velocidadePassagem,
            limite: radar.velocidade,
            dataHora: agora.toLocaleString('pt-BR'),
            status: velocidadePassagem > radar.velocidade ? 'vermelho' :
                    velocidadePassagem >= radar.velocidade * 0.9 ? 'amarelo' : 'verde'
        };
        historicoPassagens.unshift(entrada); // Mais recente primeiro
        if (historicoPassagens.length > 100) historicoPassagens.pop(); // Máximo 100
        localStorage.setItem('asb_historico', JSON.stringify(historicoPassagens));
        renderizarHistorico();
    }

    function renderizarHistorico() {
        const tbody = document.getElementById('corpo-historico');
        tbody.innerHTML = '';
        if (historicoPassagens.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;padding:20px;">Nenhuma passagem registrada ainda.</td></tr>';
            return;
        }
        historicoPassagens.forEach(p => {
            const corClass = `hist-${p.status}`;
            const emoji = p.status === 'verde' ? '🟢' : p.status === 'amarelo' ? '🟡' : '🔴';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-size:11px;">${p.local}</td>
                <td class="${corClass}">${p.velocidade}</td>
                <td>${p.limite}</td>
                <td>${emoji}</td>
                <td style="font-size:10px;">${p.dataHora}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // =====================================================================
    // TELAS OVERLAY
    // =====================================================================
    function abrirTela(id) {
        document.getElementById(id).style.display = 'flex';
        if (id === 'tela-meus-radares') renderizarMeusRadares();
        if (id === 'tela-historico') renderizarHistorico();
    }
    function fecharTela(id) { document.getElementById(id).style.display = 'none'; }

    // =====================================================================
    // AUDIO
    // =====================================================================
    function liberarAudioNavegador() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function emitirBipUnico(freq, dur) {
        if (!audioCtx) return;
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    }

    function iniciarBipeOscilatorio() {
        if (bipIntervalId) return; // Já está bipando
        bipIntervalId = setInterval(() => {
            emitirBipUnico(1200, 0.12);
        }, 800); // Bipe a cada 800ms
    }

    function pararBipeOscilatorio() {
        if (bipIntervalId) {
            clearInterval(bipIntervalId);
            bipIntervalId = null;
        }
    }

    // =====================================================================
    // GPS E NAVEGAÇÃO
    // =====================================================================
    let radaresDentroDoRaio = new Set(); // Controle para evitar registrar a mesma passagem várias vezes

    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function inicializarRastreamentoGPS() {
        if (!('geolocation' in navigator)) return;
        navigator.geolocation.watchPosition(pos => {
            minhaLatAtual  = pos.coords.latitude;
            minhaLonAtual  = pos.coords.longitude;
            velocidadeGlobal = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;

            document.getElementById('vel-atual').innerText = velocidadeGlobal;
            document.getElementById('info-gps').innerText  = `Precisão GPS: ${parseInt(pos.coords.accuracy)}m | Nuvem Ativa`;

            if (!marcadorMotorista) {
                marcadorMotorista = L.circleMarker([minhaLatAtual, minhaLonAtual], {
                    radius: 9, color: '#0079f2', fillColor: '#ffffff', fillOpacity: 1, weight: 3
                }).addTo(mapa);
            } else {
                marcadorMotorista.setLatLng([minhaLatAtual, minhaLonAtual]);
            }
            mapa.setView([minhaLatAtual, minhaLonAtual], 16);

            // Verifica radares próximos (raio 100m)
            let radarMaisProximo = null;
            let menorDist = Infinity;
            let algumDentroDoRaio = false;

            listaRadares.forEach(radar => {
                const dist = calcularDistancia(minhaLatAtual, minhaLonAtual, radar.lat, radar.lon);

                if (dist <= 100) {
                    algumDentroDoRaio = true;

                    // Registra passagem apenas uma vez por radar
                    if (!radaresDentroDoRaio.has(radar.id)) {
                        radaresDentroDoRaio.add(radar.id);
                        registrarPassagem(radar, velocidadeGlobal);
                    }
                } else {
                    // Saiu do raio — permite registrar novamente na próxima entrada
                    radaresDentroDoRaio.delete(radar.id);
                }

                if (dist < menorDist) {
                    menorDist = dist;
                    if (dist <= 100) radarMaisProximo = radar;
                }
            });

            // Controla bipe
            if (algumDentroDoRaio) {
                iniciarBipeOscilatorio();
            } else {
                pararBipeOscilatorio();
            }

            // Atualiza painel
            if (radarMaisProximo) {
                limiteGlobal = radarMaisProximo.velocidade;
                distGlobal   = `(${parseInt(menorDist)}m)`;
                statusTextoGlobal = '⚠️ RADAR À FRENTE';
                document.getElementById('texto-status').innerText = `⚠️ APROXIMAÇÃO: ${radarMaisProximo.local}`;
                document.getElementById('distancia-radar').innerText = `${parseInt(menorDist)}m`;
            } else if (menorDist <= 200) {
                // Alerta visual entre 100-200m mas sem bipe
                limiteGlobal = listaRadares.find(r => calcularDistancia(minhaLatAtual, minhaLonAtual, r.lat, r.lon) === menorDist)?.velocidade || 60;
                document.getElementById('texto-status').innerText = `⚠️ RADAR A ${parseInt(menorDist)}m`;
                document.getElementById('distancia-radar').innerText = `${parseInt(menorDist)}m`;
            } else {
                limiteGlobal = 60;
                distGlobal   = '';
                statusTextoGlobal = 'VIA MONITORADA';
                document.getElementById('texto-status').innerText = 'SINALIZADOR DE VIA ACTIVO';
                document.getElementById('distancia-radar').innerText = '';
            }

            document.getElementById('vel-maxima').innerText = limiteGlobal;
            document.getElementById('vel-minima').innerText = Math.round(limiteGlobal / 2);

            // Semáforo
            const lv = document.getElementById('luz-verde');
            const la = document.getElementById('luz-amarela');
            const lr = document.getElementById('luz-vermelha');
            lv.classList.remove('ativa'); la.classList.remove('ativa'); lr.classList.remove('ativa');
            if      (velocidadeGlobal > limiteGlobal)              lr.classList.add('ativa');
            else if (velocidadeGlobal >= limiteGlobal * 0.9)       la.classList.add('ativa');
            else                                                    lv.classList.add('ativa');

        }, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
    }

    // =====================================================================
    // TELA FLUTUANTE (Picture-in-Picture)
    // =====================================================================
    const canvas = document.getElementById('canvas-pip');
    const ctx    = canvas.getContext('2d');
    const video  = document.getElementById('video-pip');
    let pipAtivo = false;

    function desenharPainelFlutuante() {
        ctx.fillStyle = '#1e1e1e'; ctx.fillRect(0, 0, 500, 500);
        ctx.fillStyle = '#ffffff'; ctx.font = 'bold 160px Arial'; ctx.textAlign = 'center';
        ctx.fillText(velocidadeGlobal, 250, 240);
        ctx.font = 'bold 28px Arial'; ctx.fillStyle = '#888'; ctx.fillText('KM/H', 250, 295);
        ctx.fillStyle = '#ffea00'; ctx.font = 'bold 26px Arial';
        ctx.fillText(statusTextoGlobal, 250, 370);
        ctx.fillStyle = '#aaa'; ctx.font = '22px Arial';
        ctx.fillText(`Limite: ${limiteGlobal} km/h ${distGlobal}`, 250, 420);

        // Semáforo no canvas
        const cores = ['#333','#333','#333'];
        if      (velocidadeGlobal > limiteGlobal)         cores[0] = '#ff1744';
        else if (velocidadeGlobal >= limiteGlobal * 0.9)  cores[1] = '#ffea00';
        else                                               cores[2] = '#00e676';
        [100, 200, 300].forEach((y, i) => {
            ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(55, y, 28, 0, 2*Math.PI); ctx.fill();
            ctx.fillStyle = cores[i]; ctx.beginPath(); ctx.arc(55, y, 24, 0, 2*Math.PI); ctx.fill();
        });

        if (pipAtivo) requestAnimationFrame(desenharPainelFlutuante);
    }

    async function alternarModoFlutuante() {
        try {
            liberarAudioNavegador();
            if (!pipAtivo) {
                video.srcObject = canvas.captureStream(15);
                await video.play();
                await video.requestPictureInPicture();
                pipAtivo = true;
                desenharPainelFlutuante();
            } else {
                document.exitPictureInPicture();
                pipAtivo = false;
            }
        } catch (e) { alert('Dê um toque na tela antes de ativar a sobreposição.'); }
    }
    video.addEventListener('leavepictureinpicture', () => { pipAtivo = false; });

    // =====================================================================
    // INICIALIZAÇÃO
    // =====================================================================
    document.body.addEventListener('click', liberarAudioNavegador, { once: false });
    checarAutenticacaoExistente();
</script>
</body>
